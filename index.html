<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R.E.P.O. — Guide des Monstres</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --bg2: #10141c;
  --bg3: #161b26;
  --border: #2a3040;
  --accent: #00e5a0;
  --accent2: #ff4d6a;
  --accent3: #ffc23a;
  --text: #e2e8f0;
  --text2: #8896a8;
  --text3: #4a5568;
  --danger1: #2a3a28;
  --danger2: #3a3020;
  --danger3: #3a1e20;
  --danger1t: #4caf50;
  --danger2t: #ffa726;
  --danger3t: #ef5350;
  --card-w: 340px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: 'Share Tech Mono', monospace;
  font-size: 1.1rem;
  color: var(--accent);
  letter-spacing: 2px;
  flex-shrink: 0;
}
.logo span { color: var(--text2); }
.search-wrap {
  flex: 1;
  min-width: 180px;
  max-width: 380px;
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
}
#search {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  padding: 7px 10px 7px 34px;
  outline: none;
  transition: border-color 0.2s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--text3); }

.filter-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.filter-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text2);
  font-size: 11px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  letter-spacing: 1px;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--text2); color: var(--text); }
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.08); }
.filter-btn.d1.active { border-color: var(--danger1t); color: var(--danger1t); background: rgba(76,175,80,0.08); }
.filter-btn.d2.active { border-color: var(--danger2t); color: var(--danger2t); background: rgba(255,167,38,0.08); }
.filter-btn.d3.active { border-color: var(--danger3t); color: var(--danger3t); background: rgba(239,83,80,0.08); }

.session-toggle {
  background: rgba(255,77,106,0.1);
  border: 1px solid var(--accent2);
  border-radius: 4px;
  color: var(--accent2);
  font-size: 11px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.session-toggle:hover { background: rgba(255,77,106,0.2); }

/* LAYOUT */
.layout {
  display: flex;
  flex: 1;
  gap: 0;
}

/* SIDEBAR SESSION */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 57px;
  height: calc(100vh - 57px);
  overflow: hidden;
  transition: width 0.25s ease, opacity 0.25s ease;
}
.sidebar.collapsed {
  width: 0;
  opacity: 0;
  pointer-events: none;
}
.sidebar-inner { padding: 1rem; display: flex; flex-direction: column; gap: 10px; height: 100%; min-width: 260px; }
.sidebar h2 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text3);
  text-transform: uppercase;
}
.session-empty {
  color: var(--text3);
  font-size: 12px;
  font-style: italic;
  padding: 8px 0;
}
.session-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.session-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.session-item:hover { border-color: var(--accent); }
.session-item-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.session-item-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}
.session-item-alt {
  font-size: 10px;
  color: var(--text3);
}
.session-item-icons {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.session-icon {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  border: 1.5px solid;
  position: relative;
  flex-shrink: 0;
}
.session-icon.ok { border-color: #1d4e3d; background: rgba(0,229,160,0.08); }
.session-icon.bad { border-color: #5a1e22; background: rgba(255,77,106,0.08); }
.session-icon.warn { border-color: #4a3800; background: rgba(255,194,58,0.08); }
.session-icon.bad::after {
  content: '';
  position: absolute;
  width: 130%;
  height: 1.5px;
  background: var(--accent2);
  transform: rotate(-45deg);
  border-radius: 2px;
}
.session-item-tip {
  font-size: 11px;
  color: var(--text3);
  line-height: 1.4;
  border-top: 1px solid var(--border);
  padding-top: 5px;
}
.session-remove {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 2px;
  border-radius: 3px;
  transition: color 0.15s;
}
.session-remove:hover { color: var(--accent2); }
.reset-btn {
  background: rgba(255,77,106,0.1);
  border: 1px solid rgba(255,77,106,0.4);
  border-radius: 5px;
  color: var(--accent2);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  padding: 7px;
  cursor: pointer;
  width: 100%;
  transition: all 0.15s;
}
.reset-btn:hover { background: rgba(255,77,106,0.2); }

/* MAIN */
main {
  flex: 1;
  padding: 1.5rem;
  overflow-y: auto;
}
.section-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title.d1 { color: var(--danger1t); }
.section-title.d2 { color: var(--danger2t); }
.section-title.d3 { color: var(--danger3t); }
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.cards-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 2rem;
}

/* CARD IMAGE */
.card-img {
  width: 100%;
  height: 140px;
  overflow: hidden;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--border);
}
.card-img img {
  height: 130px;
  width: auto;
  max-width: 100%;
  object-fit: contain;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
  transition: transform 0.2s;
}
.card:hover .card-img img { transform: scale(1.05); }
.card-img-placeholder {
  color: var(--text3);
  font-size: 11px;
  font-style: italic;
}

/* MONSTER CARD */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: var(--card-w);
  min-width: 260px;
  max-width: 100%;
  transition: border-color 0.2s, transform 0.15s;
  position: relative;
  overflow: hidden;
}
.card:hover { border-color: #3d4a5c; }
.card.in-session { border-color: var(--accent); }
.card-header {
  padding: 12px 14px 8px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}
.card-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
}
.card-alias {
  font-size: 11px;
  color: var(--text3);
  font-style: italic;
  margin-top: 1px;
}
.card-danger {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 3px 7px;
  border-radius: 3px;
  flex-shrink: 0;
  margin-top: 2px;
}
.card-danger.d1 { background: var(--danger1); color: var(--danger1t); border: 1px solid rgba(76,175,80,0.3); }
.card-danger.d2 { background: var(--danger2); color: var(--danger2t); border: 1px solid rgba(255,167,38,0.3); }
.card-danger.d3 { background: var(--danger3); color: var(--danger3t); border: 1px solid rgba(239,83,80,0.3); }

.card-stats {
  padding: 0 14px 8px;
  display: flex;
  gap: 12px;
}
.stat {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text3);
}
.stat span { color: var(--text2); }

/* ICONS GRID */
.card-icons {
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  background: var(--bg3);
}
.icon-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  min-width: 44px;
}
.icon-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  position: relative;
  border: 2px solid;
  transition: transform 0.15s;
}
.icon-circle.ok {
  border-color: #1d4e3d;
  background: rgba(0,229,160,0.08);
}
.icon-circle.bad {
  border-color: #5a1e22;
  background: rgba(255,77,106,0.08);
}
.icon-circle.warn {
  border-color: #4a3800;
  background: rgba(255,194,58,0.08);
}
.icon-circle.bad::after {
  content: '';
  position: absolute;
  width: 130%;
  height: 2px;
  background: var(--accent2);
  transform: rotate(-45deg);
  border-radius: 2px;
}
.icon-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text3);
  text-align: center;
  line-height: 1.1;
}
.icon-circle.ok .icon-label { color: var(--accent); }
.icon-circle.bad .icon-label { color: var(--accent2); }

/* vision badge */
.vision-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 1px 4px;
  border-radius: 3px;
  position: absolute;
  bottom: -2px;
  right: -2px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text2);
  line-height: 1;
}

/* CARD BODY */
.card-body {
  padding: 10px 14px 12px;
}
.card-tip {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
}
.card-tip strong {
  color: var(--accent3);
  font-weight: 500;
}

/* ADD TO SESSION */
.card-footer {
  padding: 0 14px 12px;
}
.add-session-btn {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text3);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  padding: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.add-session-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.05); }
.add-session-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.1); }
.add-session-btn.active:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(255,77,106,0.1); }

.no-results {
  color: var(--text3);
  font-size: 13px;
  padding: 2rem 0;
  font-style: italic;
}
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">R.E.P.O.<span> // MONSTRES</span></div>
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Chercher un monstre ou surnom…" autocomplete="off">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all">Tous</button>
    <button class="filter-btn d1" data-filter="1">Danger 1</button>
    <button class="filter-btn d2" data-filter="2">Danger 2</button>
    <button class="filter-btn d3" data-filter="3">Danger 3</button>
  </div>
  <button class="session-toggle" id="sessionToggle">📋 Session</button>
</header>

<div class="layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <h2>Monstres en cours</h2>
      <div class="session-list" id="sessionList">
        <div class="session-empty" id="sessionEmpty">Aucun monstre ajouté.<br>Clique sur "+ Session" sur une carte.<br>F5 pour actualiser. [BETA]</div>
      </div>
      <button class="reset-btn" id="resetBtn">⟳ Réinitialiser la session</button>
    </div>
  </aside>

  <main id="main">
    <div id="sections-container"></div>
    <div class="no-results hidden" id="noResults">Aucun monstre trouvé pour cette recherche.</div>
  </main>

</div>

<script>
/* =====================================================================
   BASE DE DONNÉES DES MONSTRES
   ➜ Pour modifier un monstre : change les champs ci-dessous.
   ➜ Pour ajouter un monstre : copie un bloc et change les valeurs.
   ➜ aliases = noms alternatifs (surnom, description physique…)
   ➜ icons : ok = vert (à faire), bad = rouge barré (à éviter), warn = jaune (attention)
   ➜ icon types : "regard" | "cache" | "bruit" | "piece" | "vision" | "touchable"
   ===================================================================== */
const MONSTERS = [

  /* ─────────── DANGER 1 ─────────── */
  {
    id: "peeper",
    img: "Peeper",
    name: "Peeper",
    aliases: ["oeil", "eye", "plafond", "iris orange"],
    danger: 1,
    hp: 30,
    dmg: "2/sec",
    icons: [
      { type: "regard",    state: "bad",  label: "Regarder" },
      { type: "cache",     state: "ok",   label: "Se cacher" },
      { type: "bruit",     state: "ok",   label: "Bruit" },
      { type: "piece",     state: "bad",  label: "Rester" },
      { type: "vision",    state: "warn", label: "Vision", badge: "180°" },
      { type: "touchable", state: "ok",   label: "Toucher" },
    ],
    tip: "Ne bouge <strong>jamais</strong>. Il apparaît au plafond et verrouille ta caméra sur lui. <strong>Interpose un mur ou un gros objet</strong> (le chariot fonctionne). Si personne dans la pièce, disparaît après <strong>3 sec</strong>.",
  },
  {
    id: "shadow-child",
    img: "Shadow_Child",
    name: "Shadow Child",
    aliases: ["enderman", "ombre", "grand mince", "bras multiples", "enfant", "noir"],
    danger: 1,
    hp: 150,
    dmg: "30",
    icons: [
      { type: "regard",    state: "bad",  label: "Regarder" },
      { type: "cache",     state: "ok",   label: "Se cacher" },
      { type: "bruit",     state: "ok",   label: "Bruit" },
      { type: "piece",     state: "ok",   label: "Rester" },
      { type: "vision",    state: "warn", label: "Vision", badge: "180°" },
      { type: "touchable", state: "ok",   label: "Toucher" },
    ],
    tip: "<strong>Ne le regarde pas</strong>. Rire d'enfant = il est là. Tourne-lui le dos, tu peux même le traverser sans danger. Si personne le regarde, disparaît après <strong>~10 sec</strong>.",
  },
  {
    id: "gnome",
    img: "Gnome",
    name: "Gnome",
    aliases: ["nains", "nain de jardin", "pioche", "petits", "groupe", "sourire"],
    danger: 1,
    hp: 20,
    dmg: "10",
    icons: [
      { type: "regard",    state: "ok",   label: "Regarder" },
      { type: "cache",     state: "bad",   label: "Se cacher" },
      { type: "bruit",     state: "ok",   label: "Bruit" },
      { type: "piece",     state: "bad", label: "Rester" },
      { type: "vision",    state: "warn", label: "Vision", badge: "180°" },
      { type: "touchable", state: "ok",   label: "Toucher" },
    ],
    tip: "Apparaissent en <strong>groupe de 4</strong> (10 s'ils remplacent un monstre de niv 3). Ciblent les <strong>objets de valeur</strong> et les joueurs. <strong>Projette-les</strong> en l'air, ils meurent à l'impact.",
  },
  {
    id: "apex-predator",
    img: "Apex_Predator",
    name: "Apex Predator",
    aliases: ["canard", "duck", "oiseau", "coin"],
    danger: 1,
    hp: 150,
    dmg: "10/coup",
    icons: [
      { type: "regard",    state: "ok",   label: "Regarder" },
      { type: "cache",     state: "warn",  label: "Se cacher" },
      { type: "bruit",     state: "ok",   label: "Bruit" },
      { type: "piece",     state: "warn",   label: "Rester" },
      { type: "vision",    state: "warn", label: "Vision", badge: "360°" },
      { type: "touchable", state: "bad",  label: "Toucher" },
    ],
    tip: "Il te suit partout en sautant. <strong>Ne le touche/frappe surtout pas</strong>, sinon il est <strong>enragé 10 sec</strong>, inutile de se cacher, <strong>fuis</strong> jusqu'à ce qu'il se calme. S'il est calme, mettez-vous en forme d'objet, il se <strong>désintéressera et partira</strong>.",
  },
  {
    id: "spewer",
    img: "Spewer",
    name: "Spewer",
    aliases: ["vomito", "vomi", "vomir", "flagelles", "spermatozoide"],
    danger: 1,
    hp: 65,
    dmg: "10",
    icons: [
      { type: "regard",    state: "ok",   label: "Regarder" },
      { type: "cache",     state: "ok",   label: "Se cacher" },
      { type: "bruit",     state: "ok",   label: "Bruit" },
      { type: "piece",     state: "ok",   label: "Rester" },
      { type: "vision",    state: "warn", label: "Vision", badge: "180°" },
      { type: "touchable", state: "ok", label: "Toucher" },
    ],
    tip: "Se colle à ton visage pour <strong>10 à 60 sec</strong>. Évites son vomi. <strong>Tourne un angle et cache-toi</strong>, il perd ta trace très vite.",
  },
  {
    id: "bella",
    img: "Bella",
    name: "Bella",
    aliases: ["tricycle", "velo", "rouge", "3 roues", "jouet", "sonette"],
    danger: 1,
    hp: 200,
    dmg: "5/coup",
    icons: [
      { type: "regard",    state: "ok",    label: "Regarder" },
      { type: "cache",     state: "bad",   label: "Se cacher" },
      { type: "bruit",     state: "ok",    label: "Bruit" },
      { type: "piece",     state: "warn",  label: "Rester" },
      { type: "vision",    state: "warn",  label: "Vision", badge: "360°" },
      { type: "touchable", state: "bad",   label: "Toucher" },
    ],
    tip: "<strong>Ne l'attrape/frappe pas et dégage le passage</strong> quand elle sonne. 3 coups de sonnette = attaque le joueur <strong>le plus proche</strong>. Se calme après <strong>10 sec</strong> ou si elle est <strong>assommée</strong>.",
  },
  {
    id: "birthday-boy",
    img: "Birthday_Boy",
    name: "Birthday Boy",
    aliases: ["gamin", "ballons", "anniversaire", "enfant ballons", "enfant", "gamin aux ballons"],
    danger: 1,
    hp: 150,
    dmg: "10/coup",
    icons: [
      { type: "regard",    state: "ok",   label: "Regarder" },
      { type: "cache",     state: "ok",   label: "Se cacher" },
      { type: "bruit",     state: "ok",   label: "Bruit" },
      { type: "piece",     state: "ok",   label: "Rester" },
      { type: "vision",    state: "warn", label: "Vision", badge: "180°" },

/* =====================================================================
   RENDU DES ICÔNES
   ===================================================================== */
const ICON_EMOJIS = {
  regard:    "👁️",
  cache:     "🫣",
  bruit:     "🔊",
  piece:     "🚪",
  vision:    "🎯",
  touchable: "✋",
};

function renderIcon(icon) {
  const badge = icon.badge ? `<span class="vision-badge">${icon.badge}</span>` : "";
  return `<div class="icon-item">
    <div class="icon-circle ${icon.state}" title="${icon.label}">
      <span style="font-size:16px;line-height:1;">${ICON_EMOJIS[icon.type]||"?"}</span>
      ${badge}
    </div>
    <div class="icon-label">${icon.label}</div>
  </div>`;
}

function dangerLabel(d) {
  if (d===1) return "DANGER 1";
  if (d===2) return "DANGER 2";
  return "DANGER 3";
}

function renderCard(m) {
  const iconsHtml = m.icons.map(renderIcon).join("");
  const imgHtml = m.img
    ? `<div class="card-img"><img src="img/${m.img}.webp" alt="${m.name}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=card-img-placeholder>image manquante</span>'"></div>`
    : "";
  return `<div class="card" id="card-${m.id}" data-id="${m.id}" data-danger="${m.danger}" data-search="${(m.name+" "+m.aliases.join(" ")).toLowerCase()}">
    ${imgHtml}
    <div class="card-header">
      <div>
        <div class="card-name">${m.name}</div>
        <div class="card-alias">${m.aliases.slice(0,3).join(" · ")}</div>
      </div>
      <div class="card-danger d${m.danger}">${dangerLabel(m.danger)}</div>
    </div>
    <div class="card-stats">
      ${m.hp ? `<div class="stat">PV <span>${m.hp}</span></div>` : ""}
      ${m.dmg ? `<div class="stat">DMG <span>${m.dmg}</span></div>` : ""}
    </div>
    <div class="card-icons">${iconsHtml}</div>
    <div class="card-body">
      <div class="card-tip">${m.tip}</div>
    </div>
    <div class="card-footer">
      <button class="add-session-btn" id="sbtn-${m.id}" data-id="${m.id}">+ Ajouter à la session</button>
    </div>
  </div>`;
}

/* =====================================================================
   INIT
   ===================================================================== */
let sessionIds = JSON.parse(localStorage.getItem("repo_session")||"[]");
let activeFilter = "all";
let sidebarOpen = true;

function buildSections() {
  const container = document.getElementById("sections-container");
  const groups = {1:[],2:[],3:[]};
  MONSTERS.forEach(m => groups[m.danger].push(m));
  let html = "";
  [1,2,3].forEach(d => {
    if (!groups[d].length) return;
    html += `<div class="section-title d${d}">${dangerLabel(d)} (${groups[d].length} monstres)</div>
    <div class="cards-grid" id="grid-d${d}">${groups[d].map(renderCard).join("")}</div>`;
  });
  container.innerHTML = html;
}

function applyFilters() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  let anyVisible = false;
  MONSTERS.forEach(m => {
    const card = document.getElementById("card-"+m.id);
    if (!card) return;
    const matchFilter = activeFilter === "all" || String(m.danger) === activeFilter;
    const matchSearch = !q || card.dataset.search.includes(q);
    const show = matchFilter && matchSearch;
    card.style.display = show ? "" : "none";
    if (show) anyVisible = true;
  });
  // hide empty grids
  [1,2,3].forEach(d => {
    const grid = document.getElementById("grid-d"+d);
    if (!grid) return;
    const hasVisible = [...grid.children].some(c => c.style.display !== "none");
    // section title is sibling — use display via prev element
    const prevTitle = grid.previousElementSibling;
    if (prevTitle) prevTitle.style.display = hasVisible ? "" : "none";
    grid.style.display = hasVisible ? "" : "none";
  });
  document.getElementById("noResults").classList.toggle("hidden", anyVisible);
}

/* =====================================================================
   SESSION
   ===================================================================== */
function saveSession() {
  localStorage.setItem("repo_session", JSON.stringify(sessionIds));
}

function toggleSession(id) {
  if (sessionIds.includes(id)) {
    sessionIds = sessionIds.filter(x => x !== id);
  } else {
    sessionIds.push(id);
  }
  saveSession();
  syncCards();
  rebuildSidebar();
}

function syncCards() {
  MONSTERS.forEach(function(m) {
    var btn = document.getElementById("sbtn-" + m.id);
    var card = document.getElementById("card-" + m.id);
    var inSession = sessionIds.indexOf(m.id) !== -1;
    if (btn) {
      if (inSession) {
        btn.classList.add("active");
        btn.textContent = "✓ Dans la session (retirer)";
      } else {
        btn.classList.remove("active");
        btn.textContent = "+ Ajouter à la session";
      }
    }
    if (card) {
      if (inSession) {
        card.classList.add("in-session");
      } else {
        card.classList.remove("in-session");
      }
    }
  });
}

function rebuildSidebar() {
  var list = document.getElementById("sessionList");
  var empty = document.getElementById("sessionEmpty");
  list.innerHTML = "";
  if (sessionIds.length === 0) {
    empty.style.display = "";
    list.appendChild(empty);
    return;
  }
  empty.style.display = "none";
  for (var i = 0; i < sessionIds.length; i++) {
    var id = sessionIds[i];
    var m = null;
    for (var j = 0; j < MONSTERS.length; j++) {
      if (MONSTERS[j].id === id) { m = MONSTERS[j]; break; }
    }
    if (!m) continue;
    var iconsHtml = "";
    for (var k = 0; k < m.icons.length; k++) {
      var ic = m.icons[k];
      iconsHtml += '<div class="session-icon ' + ic.state + '" title="' + ic.label + '"><span style="font-size:11px;line-height:1;">' + (ICON_EMOJIS[ic.type] || "") + '</span></div>';
    }
    var item = document.createElement("div");
    item.className = "session-item";
    item.setAttribute("data-mid", m.id);
    item.innerHTML =
      '<div class="session-item-top">' +
        '<div>' +
          '<div class="session-item-name">' + m.name + '</div>' +
          '<div class="session-item-alt">' + (m.aliases[0] || "") + '</div>' +
        '</div>' +
        '<button class="session-remove" data-mid="' + m.id + '" title="Retirer">×</button>' +
      '</div>' +
      '<div class="session-item-icons">' + iconsHtml + '</div>' +
      '<div class="session-item-tip">' + shortTip(m.tip) + '</div>';
    list.appendChild(item);
  }

  // Attacher les listeners APRES insertion dans le DOM
  var removes = list.querySelectorAll(".session-remove");
  for (var r = 0; r < removes.length; r++) {
    (function(btn) {
      btn.addEventListener("click", function(e) {
        e.stopPropagation();
        toggleSession(btn.getAttribute("data-mid"));
      });
    })(removes[r]);
  }
  var items = list.querySelectorAll(".session-item");
  for (var s = 0; s < items.length; s++) {
    (function(item) {
      item.addEventListener("click", function(e) {
        if (e.target.classList.contains("session-remove")) return;
        var mid = item.getAttribute("data-mid");
        var card = document.getElementById("card-" + mid);
        if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
      });
    })(items[s]);
  }
}

function stripTags(html) {
  return html.replace(/<[^>]*>/g, "");
}
function shortTip(tip) {
  var plain = stripTags(tip);
  var words = plain.split(/\s+/).slice(0, 8).join(" ");
  return words + (plain.split(/\s+/).length > 8 ? "…" : "");
}

/* =====================================================================
   EVENTS
   ===================================================================== */
document.getElementById("search").addEventListener("input", applyFilters);
document.querySelectorAll(".filter-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});
document.getElementById("sessionToggle").addEventListener("click", function() {
  sidebarOpen = !sidebarOpen;
  document.getElementById("sidebar").classList.toggle("collapsed", !sidebarOpen);
});
document.getElementById("resetBtn").addEventListener("click", function() {
  if (confirm("Réinitialiser la session ? Tous les monstres seront retirés.")) {
    sessionIds = [];
    saveSession();
    syncCards();
    rebuildSidebar();
  }
});

/* =====================================================================
   BOOT
   ===================================================================== */
buildSections();

// Attacher les boutons des cartes après buildSections
MONSTERS.forEach(function(m) {
  var btn = document.getElementById("sbtn-" + m.id);
  if (btn) {
    btn.addEventListener("click", function() {
      toggleSession(m.id);
    });
  }
});

syncCards();
rebuildSidebar();
</script>
</body>
</html>
